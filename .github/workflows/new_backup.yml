name: NewBackup
on:
  workflow_dispatch:
jobs:
  run-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16  # 降级到 Node 16 以获得更好的兼容性

      - name: Force Install
        run: npm install --ignore-scripts  # 关键：无视所有报错脚本，强行安装零件

      - name: Run
        run: node index.js
        env:
          BACKUP_TYPE: "question"
          START_ID: 76850
          END_ID: 76857

      - name: Save
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "bot"
          git add .
          git commit -m "update" || exit 0
          git push
